name: my_research_project

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip

  # SQLite compatibility for Jupyter Server
  - sqlite>=3.45
  - libsqlite>=3.45

  # Jupyter / JupyterHub compatibility
  - jupyterhub
  - jupyterlab
  - jupyter-server
  - notebook
  - ipykernel
  - nbformat
  - nbclient

  # Core scientific computing
  - numpy
  - pandas
  - scipy
  - matplotlib
  - tqdm
  - joblib

  # Geospatial and raster processing
  - rasterio
  - geopandas
  - shapely
  - pyproj
  - fiona
  - rioxarray
  - xarray
  - netcdf4
  - dask
  - cartopy
  - folium
  - mapclassify

  # Modelling and statistics
  - scikit-learn
  - statsmodels

  # Google Earth Engine / geemap
  - pip:
      - earthengine-api
      - geemap
